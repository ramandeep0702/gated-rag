name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (lint + test deps only)
        # Heavy backends (faiss-cpu, sentence-transformers, datasets) are imported lazily, so the
        # unit suite runs on a light footprint. The full end-to-end pipeline needs the extras.
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy tiktoken pytest ruff

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q
