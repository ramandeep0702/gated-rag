# gated-rag — default configuration
# One file holds every knob. To run a variant, copy this file and point the pipeline at the copy;
# code reads config, code does not hardcode. configs/default.yaml is the source of truth and is
# mirrored by the typed dataclasses in src/gated_rag/config.py.

corpus:
  source: huggingface                     # where raw contracts come from (only `huggingface` wired for now)
  hf_dataset: theatticusproject/cuad-qa    # CUAD QA build: clause annotations -> golden eval set
  hf_split: train                          # split to ingest. CUAD ships train/test; annotations live here  # VERIFY exact split names on HF
  limit: null                              # null = all 510 contracts; set an int for fast dev loops

catalog:
  # Unity Catalog three-level namespace: <catalog>.<schema>.<table>
  catalog: workspace                       # RESOLVED: Free Edition has no `main`; `workspace` is the writable catalog (00_verify_env)
  schema: gated_rag                        # created if missing during ingest
  bronze_table: contracts_bronze           # raw contract text + metadata
  silver_table: chunks_silver              # cleaned + chunked
  gold_table:   chunks_gold                # chunks + embeddings (the retrieval source)

chunking:
  strategy: token                          # token | structure  — see docs/design.md "decisions" (your call)
  max_tokens: 512                          # target chunk size, in tokens
  overlap_tokens: 64                       # sliding-window overlap so a clause isn't split across a boundary
  tokenizer: cl100k_base                   # tokenizer used for counting; keep aligned with the embedding model family
  min_chunk_chars: 50                      # drop sub-chunks shorter than this (boilerplate/whitespace)

embedding:
  backend: sentence_transformers           # interface key -> resolves to an Embedder impl (build_embedder)
  model: BAAI/bge-small-en-v1.5            # small, strong, CPU-friendly — safe on Free Edition
  batch_size: 64
  normalize: true                          # L2-normalize vectors so inner-product == cosine similarity
  dim: 384                                 # embedding dimension; MUST match the model + FAISS index + VS endpoint

retrieval:
  backend: faiss                           # faiss (default, always works) | vector_search (Databricks)  # VERIFY VS on Free Edition
  top_k: 5                                 # chunks returned per query (default k for metrics unless overridden in eval)

  faiss:                                   # used when backend == faiss
    index_type: flat                       # flat = exact brute force; fine for ~510 contracts. IVF/HNSW only if too slow
    metric: ip                             # ip (inner product; pair with normalize:true for cosine) | l2
    persist_path: ./.faiss                 # local index directory (gitignored)

  vector_search:                           # used when backend == vector_search
    endpoint_name: gated-rag-endpoint
    index_name: workspace.gated_rag.chunks_gold_index   # VERIFY: requires Vector Search entitlement on the workspace
    embedding_source: precomputed          # precomputed (we push gold vectors) | managed (endpoint embeds for us)

eval:
  golden_path: ./eval/golden/cuad_golden.jsonl   # derived from CUAD annotations: {question, contract_id, answer_spans}
  k_values: [1, 3, 5, 10]                  # report each metric at these k
  metrics: [recall_at_k, mrr, groundedness]
  # groundedness here = does the retrieved chunk actually CONTAIN the annotated answer span
  # (char-span overlap against the golden span). No LLM judge needed.  # VERIFY if you want an LLM-judged variant later

  # ---- THE GATE ----
  # If enabled and on_failure == fail, the run exits non-zero when ANY threshold is unmet.
  # This mirrors gating a data pipeline on data-quality checks.
  gate:
    enabled: true
    on_failure: fail                       # fail (block, non-zero exit) | warn (log + continue)
    thresholds:
      recall_at_5: 0.80                    # >= 80% of golden clauses present in top-5
      mrr: 0.65                            # mean reciprocal rank of the correct clause
      groundedness: 0.70                   # >= 70% of retrieved-top-1 chunks overlap the golden span

run:
  seed: 42                                 # determinism for any sampling / stochastic step
  mlflow:
    enabled: false                         # log metrics + thresholds + pass/fail as an MLflow run  # VERIFY MLflow tracking on Free Edition
    experiment: /Users/ramandeep0702/gated-rag
