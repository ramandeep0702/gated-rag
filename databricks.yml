# Databricks Asset Bundle — the medallion pipeline as a single Job (the "pipeline view").
#
# Pipeline dependency graph (rendered as a task DAG under Workflows):
#
#     ingest_bronze ──▶ chunk_silver ──▶ embed_gold ──▶ index_and_eval
#       (Bronze)          (Silver)         (Gold)          (THE GATE)
#       CUAD→Delta      chunk+char_span   +embeddings   per-contract metrics,
#                                                        fails job on regression
#
# Each task depends on the one before it (`depends_on`), so a stage only runs once its upstream
# table exists. The bundle syncs this whole repo (notebooks + src/ + configs/) to the workspace on
# deploy, and the tasks run those synced copies — no GitHub access needed from the job, and local
# edits take effect on the next `deploy` without pushing.
#
# Deploy + run with one command:  ./scripts/deploy.ps1 -Run        (Windows)
#                                 ./scripts/deploy.sh --run         (bash)

bundle:
  name: gated-rag

variables:
  # Max contracts for ingest. "25" = fast first run; pass "" (empty) for the full ~510 corpus.
  limit:
    default: "25"

# Make sure src/ and configs/ ride along to the workspace so the notebooks can import gated_rag
# and load the config (they aren't referenced as tasks, so include them explicitly).
sync:
  include:
    - src/**
    - configs/**

resources:
  jobs:
    gated_rag_medallion:
      name: gated-rag-medallion
      # Bound the whole run so nothing hangs indefinitely. Sized for the full ~510-contract corpus
      # (cold start + %pip + HF model download + CPU embedding of ~12k chunks).
      timeout_seconds: 10800
      tasks:
        - task_key: ingest_bronze
          timeout_seconds: 1800
          notebook_task:
            notebook_path: ./notebooks/01_ingest.py
            base_parameters:
              repo_root: ${workspace.file_path}
              limit: ${var.limit}

        - task_key: chunk_silver
          depends_on: [{ task_key: ingest_bronze }]
          timeout_seconds: 1800
          notebook_task:
            notebook_path: ./notebooks/02_chunk_silver.py
            base_parameters:
              repo_root: ${workspace.file_path}

        - task_key: embed_gold
          depends_on: [{ task_key: chunk_silver }]
          timeout_seconds: 3600
          notebook_task:
            notebook_path: ./notebooks/03_embed_gold.py
            base_parameters:
              repo_root: ${workspace.file_path}

        - task_key: index_and_eval
          depends_on: [{ task_key: embed_gold }]
          timeout_seconds: 3600
          notebook_task:
            notebook_path: ./notebooks/04_index_and_eval.py
            base_parameters:
              repo_root: ${workspace.file_path}

targets:
  dev:
    default: true
    mode: development
    # No workspace.host here on purpose: auth + host come from DATABRICKS_HOST / DATABRICKS_TOKEN
    # env vars (the deploy script sets them), so nothing in this file needs hand-editing.
